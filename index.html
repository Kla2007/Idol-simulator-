<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>愛豆模擬器 Agency Activity Edition</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <main class="phone">
    <section id="setupScreen" class="screen active setup-bg">
      <div class="status-row"><span>18:26</span><span>📶 🔥 🔋</span></div>
      <h1>✨ 創建你的愛豆身份</h1>
      <p class="subtitle">個性化你的模擬體驗</p>
      <div class="big-avatar" id="setupAvatarPreview">⭐</div>

      <form class="creator">
        <label>愛豆名字
          <input id="playerNameInput" maxlength="16" placeholder="例如：接不接" />
        </label>
        <label>粉絲名
          <input id="fanNameInput" maxlength="16" placeholder="例如：雨🌧️" />
        </label>
        <label>年齡
          <input id="ageInput" type="number" min="14" max="35" value="18" />
        </label>
        <label>應援色
          <div class="color-row">
            <button type="button" class="color-dot selected" data-color="pink"></button>
            <button type="button" class="color-dot" data-color="blue"></button>
            <button type="button" class="color-dot" data-color="purple"></button>
            <button type="button" class="color-dot" data-color="green"></button>
            <button type="button" class="color-dot" data-color="yellow"></button>
            <button type="button" class="color-dot" data-color="black"></button>
          </div>
        </label>
        <label>頭像 Emoji
          <input id="avatarInput" maxlength="2" placeholder="⭐" />
        </label>
      </form>

      <button id="startBtn" class="wide">設置完成 →</button>
      <button id="randomBtn" class="ghost wide">隨機身份</button>
    </section>

    <section id="homeScreen" class="screen home-bg">
      <div class="status-row"><span>18:25</span><span>📶 🔥 🔋</span></div>
      <div class="search-bar"><span>🔍 搜你想看的</span><b>搜索</b></div>
      <div class="lock-time">18:25</div>
      <p class="date">2026年5月26日 周二</p>

      <div class="weather">
        <span>☀️</span>
        <div><b>22°C</b><p>首爾 · 晴朗</p></div>
      </div>

      <section class="app-grid">
        <button data-app="profile">👤<span>主頁</span></button>
        <button data-app="company" class="badge" data-count="7">🏢<span>公司</span></button>
        <button data-app="weverse" class="badge" data-count="99+">W<span>WVS</span></button>
        <button data-app="kakao" class="badge" data-count="38">K<span>KakaoTalk</span></button>

        <button data-app="bubble" class="badge" data-count="18">🫧<span>泡泡</span></button>
        <button data-app="instagram">◎<span>Instagram</span></button>
        <button data-app="privateContact" class="badge" data-count="5">💌<span>私聯</span></button>
        <button data-app="sasaeng" class="badge" data-count="!">🚨<span>私生</span></button>

        <button data-app="hotsearch" class="badge" data-count="5">🔥<span>熱搜</span></button>
        <button data-app="activities">🎫<span>活動</span></button>
        <button data-app="call">C<span>打Call</span></button>
        <button data-app="mail" class="badge" data-count="3">✉️<span>粉絲信</span></button>
        <button data-app="live">🎙️<span>直播</span></button>

        <button data-app="shop">🛍️<span>消費</span></button>
        <button data-app="stats">📊<span>數據</span></button>
        <button data-app="save">💾<span>存檔</span></button>
      </section>

      <section class="mini-stats">
        <div><b id="fansHome">502</b><span id="fanNameHome">粉絲</span></div>
        <div><b id="moneyHome">0</b><span>收入</span></div>
        <div><b id="popularityHome">15</b><span>人氣</span></div>
        <div><b id="energyHome">80</b><span>體力</span></div>
      </section>

      <p class="slogan">又首測出愛豆模擬器</p>
    </section>

    <section id="appScreen" class="screen">
      <div class="app-topbar">
        <button id="backHome" class="icon-btn">←</button>
        <h2 id="appTitle">App</h2>
        <button id="quickSave" class="icon-btn">💾</button>
      </div>
      <div id="appContent"></div>
    </section>
  </main>

  <div id="toast" class="toast hidden"></div>
  <script src="game.js"></script>
</body>
</html>
